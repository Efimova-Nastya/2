<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты — Милан</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo">Милан</div>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="tariffs.html">Тарифы</a>
                <a href="about.html">О нас</a>
                <button class="btn btn-primary">Войти</button>
            </nav>
        </div>
    </header>

    <section class="cta">
        <div class="container cta-content">
            <h2>Готовы оптимизировать управление персоналом?</h2>
            <p>Начните бесплатный 14-дневный пробный период прямо сейчас</p>
            <form class="cta-form" action="#" method="POST">
                <div class="form-group">
                    <label for="name">Имя</label>
                    <input type="text" id="name" name="name" placeholder="Введите имя" required>
                </div>
                <div class="form-group">
                    <label for="surname">Фамилия</label>
                    <input type="text" id="surname" name="surname" placeholder="Введите фамилию" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <label for="info">Дополнительная информация</label>
                    <textarea id="info" name="info" rows="3" placeholder="Расскажите о вашем бизнесе"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Начать бесплатно</button>
            </form>
        </div>
    </section>
</body>
</html>
